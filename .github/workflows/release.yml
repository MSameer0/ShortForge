name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            executable: shortforge
            asset: shortforge-linux-${{ github.ref_name }}

          - os: windows-latest
            executable: shortforge.exe
            asset: shortforge-windows-${{ github.ref_name }}.exe

          - os: macos-latest
            executable: shortforge
            asset: shortforge-macos-${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "${{ matrix.executable }}" \
            --collect-binaries imageio_ffmpeg \
            main.py
        shell: bash

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mv "dist/${{ matrix.executable }}" "dist/${{ matrix.asset }}"

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Rename-Item `
            -Path "dist\${{ matrix.executable }}" `
            -NewName "${{ matrix.asset }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            executable: shortforge
            asset: shortforge-linux-${{ github.ref_name }}

          - os: windows-latest
            executable: shortforge.exe
            asset: shortforge-windows-${{ github.ref_name }}.exe

          - os: macos-latest
            executable: shortforge
            asset: shortforge-macos-${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed `
            --name "${{ matrix.executable }}" `
            --collect-binaries imageio_ffmpeg `
            main.py

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "${{ matrix.executable }}" \
            --collect-binaries imageio_ffmpeg \
            main.py

      - name: Prepare asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item `
            "dist\${{ matrix.executable }}" `
            "dist\${{ matrix.asset }}"

      - name: Prepare asset (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp "dist/${{ matrix.executable }}" "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
